name: 🎨 Preview Deployment

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  # Preview Frontend
  preview-frontend:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🎨 Build Preview
      run: |
        # Create preview build
        mkdir -p preview
        
        # Copy and modify index.html for preview
        cp index.html preview/
        
        # Update with preview URLs
        sed -i 's|http://localhost:8000|https://preview-backend-${{ github.event.number }}.railway.app|g' preview/index.html
        sed -i 's|ws://localhost:8000|wss://preview-backend-${{ github.event.number }}.railway.app|g' preview/index.html
        
        # Add preview banner
        sed -i 's|<body>|<body><div style="position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, #ff6b6b, #4ecdc4); color: white; text-align: center; padding: 8px; font-weight: bold; z-index: 9999;">🎨 Preview Deploy - PR #${{ github.event.number }}</div>|' preview/index.html
    
    - name: 🚀 Deploy Preview Backend
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        service-name: preview-backend-${{ github.event.number }}
    
    - name: 📋 Get Preview URL
      id: preview
      run: |
        # Get the preview service URL
        PREVIEW_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          "https://backpack.railway.app/graphql/v2" \
          -H "Content-Type: application/json" \
          -d '{"query":"query { project(projectId: \"${{ secrets.RAILWAY_PROJECT_ID }}\") { services { edges { node { name url } } } }"}' | \
          jq -r '.data.project.services.edges[] | select(.node.name | contains("preview-backend-'${{ github.event.number }}'")) | .node.url')
        
        echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        
        if [ -n "$PREVIEW_URL" ]; then
          echo "✅ Preview backend deployed to: $PREVIEW_URL"
        else
          echo "❌ Failed to get preview URL"
          exit 1
        fi
    
    - name: 💬 Comment on PR
      uses: actions/github-script@v6
      with:
        script: |
          const previewUrl = `${{ steps.preview.outputs.preview_url }}`;
          const comment = `
          ## 🎨 Preview Deployment Ready!
          
          ### 🌐 Preview Links
          - **Frontend Preview**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-${{ github.event.number }}
          - **Backend API**: ${previewUrl}
          - **API Docs**: ${previewUrl}/api/docs
          
          ### 🚀 How to Test
          1. Visit the frontend preview link
          2. Test the WebSocket connection
          3. Try the live stream controls
          4. Check the real-time updates
          
          ### 📝 Notes
          - This is a temporary preview deployment
          - It will be automatically cleaned up when the PR is merged/closed
          - Data is reset on each deployment
          
          ---
          🤖 *This comment was automatically generated by GitHub Actions*
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: 🧪 Test Preview
      run: |
        # Test the preview deployment
        PREVIEW_URL="${{ steps.preview.outputs.preview_url }}"
        
        echo "Testing preview at: $PREVIEW_URL"
        
        # Health check
        if curl -f -s "$PREVIEW_URL/api/health" > /dev/null; then
          echo "✅ Backend health check passed"
        else
          echo "❌ Backend health check failed"
          exit 1
        fi
        
        # Main page check
        if curl -f -s "$PREVIEW_URL" > /dev/null; then
          echo "✅ Main page check passed"
        else
          echo "❌ Main page check failed"
          exit 1
        fi
    
    - name: 📊 Preview Status
      run: |
        echo "🎨 Preview deployment completed successfully!"
        echo "🌐 Backend: ${{ steps.preview.outputs.preview_url }}"
        echo "📚 API Docs: ${{ steps.preview.outputs.preview_url }}/api/docs"
        echo "💬 PR comment added with preview links"

  # Preview Tests
  preview-tests:
    runs-on: ubuntu-latest
    needs: preview-frontend
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🧪 Test Preview Backend
      run: |
        PREVIEW_URL="${{ needs.preview-frontend.outputs.preview-url }}"
        
        echo "Testing preview backend: $PREVIEW_URL"
        
        # Test API endpoints
        curl -f "$PREVIEW_URL/api/health" || exit 1
        curl -f "$PREVIEW_URL/" || exit 1
        
        # Test WebSocket
        python3 -c "
        import asyncio
        import websockets
        import json
        
        async def test_preview_websocket():
            try:
                ws_url = '$PREVIEW_URL'.replace('http', 'ws') + '/ws/test-user'
                async with websockets.connect(ws_url) as websocket:
                    await websocket.send(json.dumps({'type': 'ping'}))
                    response = await websocket.recv()
                    print('✅ WebSocket test passed:', response)
                    return True
            except Exception as e:
                print('❌ WebSocket test failed:', e)
                return False
        
        result = asyncio.run(test_preview_websocket())
        exit(0 if result else 1)
        " || exit 1
    
    - name: 📊 Performance Test
      run: |
        PREVIEW_URL="${{ needs.preview-frontend.outputs.preview-url }}"
        
        echo "Running performance tests on preview..."
        
        # Simple load test
        for i in {1..10}; do
          curl -f -s "$PREVIEW_URL/api/health" > /dev/null || exit 1
          echo "Request $i: OK"
          sleep 0.1
        done
        
        echo "✅ Performance tests passed"
    
    - name: 📝 Update PR Status
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'success',
            target_url: '${{ needs.preview-frontend.outputs.preview-url }}',
            description: 'Preview deployment successful',
            context: 'preview/deployment'
          });

  # Cleanup Preview (on PR close)
  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    
    steps:
    - name: 🧹 Cleanup Preview
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        service-name: preview-backend-${{ github.event.number }}
        command: delete
    
    - name: 💬 Update PR Comment
      uses: actions/github-script@v6
      with:
        script: |
          const comment = `
          ## 🧹 Preview Cleanup
          
          The preview deployment for this PR has been cleaned up.
          
          ---
          🤖 *This preview was automatically cleaned up when the PR was closed*
          `;
          
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not create comment:', error);
          }
    
    - name: 📊 Cleanup Status
      run: |
        echo "🧹 Preview cleanup completed"
        echo "Preview service: preview-backend-${{ github.event.number }}"
        echo "Status: Deleted"
